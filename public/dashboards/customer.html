<!-- public/dashboards/customer.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Account - Service Portal</title>
    
    <!-- Shared Layout Styles -->
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/dashboard-layout.css">
    <link rel="stylesheet" href="/css/forms.css">
</head>
<body>
    <!-- Navbar (Shared across all dashboards) -->
    <nav class="navbar">
        <div class="container navbar-content">
            <div class="logo">
                <span class="logo-icon">🏢</span>
                <span class="logo-text">Your Company</span>
            </div>
            <div class="nav-user-info">
                <span id="user-name-display" style="cursor: pointer; text-decoration: underline;">Loading...</span>
                <div id="profile-modal" class="modal-overlay" style="display: none;">
                  <div class="modal-content">
                    <div class="modal-header">
                        <h2>Edit Profile</h2>
                        <span class="close-modal" onclick="closeProfileModal()">&times;</span>
                    </div>
                    
                    <form id="profile-form">
                        <!-- Read Only: Email -->
                        <div class="form-group">
                            <label class="form-label">Email Address</label>
                            <input type="email" id="profile-email" class="form-input" disabled title="Email cannot be changed">
                            <small style="color: #888;">Contact support to change email.</small>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">First Name<span class="required-marker">*</span></label>
                                <input type="text" id="profile-first-name" class="form-input" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Last Name<span class="required-marker">*</span></label>
                                <input type="text" id="profile-last-name" class="form-input" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Phone Number</label>
                            <input type="tel" id="profile-phone" class="form-input">
                        </div>

                        <div class="form-group">
                            <label class="form-label">New Password (Leave blank to keep current)</label>
                            <input type="password" id="profile-password" class="form-input" placeholder="********">
                        </div>

                        <div class="modal-actions">
                            <button type="button" onclick="closeProfileModal()" class="btn btn-secondary">Cancel</button>
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                        </div>
                    </form>
                    
                    <div id="profile-message" class="alert" style="display:none; margin-top:10px;"></div>
                  </div>

                </div>
                <button id="logout-btn" class="btn-logout">Logout</button>
            </div>
        </div>
    </nav>

    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Customer Portal</h2>
            </div>
            <nav id="sidebar-menu">
                <!-- Menu items injected by JS based on roles -->
                <a href="#" class="sidebar-link active">
                    <span class="icon">📋</span>
                    <span>Dashboard</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="dashboard-header">
                <h1>Welcome Back, <span id="header-name">Guest</span>!</h1>
                <p>Manage your appointments and invoices below.</p>
            </header>

            <!-- Section 1: Job History -->
            <section id="jobs-section" class="card-section">
                <div class="dashboard-header-sub">
                    <h2>Recent Jobs</h2>
                </div>
                <div id="job-history-container" class="dashboard-grid">
                    <!-- Job cards will be injected here by feature -->
                    <p class="loading-text">Loading your job history...</p>
                </div>
            </section>

            <!-- Section 2: Invoices -->
            <section id="invoices-section" class="card-section" style="margin-top: 40px;">
                <div class="dashboard-header-sub">
                    <h2>Download Invoices</h2>
                </div>
                <div id="invoice-list-container" class="dashboard-grid">
                    <!-- Invoice list will be injected here by feature -->
                    <p class="loading-text">Loading invoices...</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <!-- 1. Auth Modules (Must load first for guard checks) -->
    <script type="module">
        import { Session } from '/js/auth/session.js';
        import { Guards } from '/js/auth/guards.js';

        // Enforce login immediately
        if (!Session.isAuthenticated()) {
            window.location.href = '/login.html';
        } else {
            // Update User Name
            const name = localStorage.getItem('user_name');
            document.getElementById('header-name').textContent = name || 'Customer';
            document.getElementById('user-name-display').textContent = name || 'Customer';

            const logoutBtn = document.getElementById('logout-btn');
            if (logoutBtn) {
              logoutBtn.addEventListener('click', () => {
                Session.logout();
            });

            document.getElementById('user-name-display').addEventListener('click', () => openProfileModal());
          }
        }
    </script>

    <!-- 2. Feature Modules -->
    <script type="module" src="/js/features/profile-manager.js"></script>
    <script type="module" src="/js/features/job-history.js"></script>
    <script type="module" src="/js/features/invoice-viewer.js"></script>
</body>
</html>
