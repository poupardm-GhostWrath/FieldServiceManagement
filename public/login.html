<!-- public/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/forms.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container navbar-content">
            <div class="logo">
                <i class="fa-solid fa-building logo-icon-fa"></i>
                <span class="logo-text">Your Company</span>
            </div>
            <div class="nav-actions">
                <a href="/" class="nav-link">Home</a>
                <a href="/register.html" class="nav-link">Register</a>
            </div>
        </div>
    </nav>

    <!-- Login Section -->
    <section class="login-wrapper">
        <div class="form-container">
            <div class="form-header">
                <h2>Welcome Back!</h2>
                <p>Sign in to access your dashboard</p>
            </div>

            <!-- Alert Messages -->
            <div id="alertBox" class="alert alert-error" style="display: none;">
                <span id="alertMessage"></span>
            </div>
            <div id="successAlert" class="alert alert-success" style="display: none;">
                <span id="successMessage"></span>
            </div>

            <form id="loginForm" novalidate>
                <!-- Email Field -->
                <div class="form-group">
                    <label class="form-label" for="email">Email Address<span class="required-marker">*</span></label>
                    <input type="email" id="email" name="email" class="form-input" required placeholder="your.email@example.com">
                    <div class="error-message" id="error-email"></div>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label class="form-label" for="password">Password<span class="required-marker">*</span></label>
                    <input type="password" id="password" name="password" class="form-input" required placeholder="Enter your password">
                    <div class="error-message" id="error-password"></div>
                    
                    <!-- Show/Hide Password Toggle -->
                    <button type="button" id="togglePassword" class="toggle-password">Show</button>
                </div>

                <!-- Remember Me & Forgot Password Row -->
                <div class="form-row">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe" name="rememberMe">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-submit" id="submitBtn">Login</button>
            </form>

            <div class="back-link">
                Don't have an account? <a href="/register.html">Register here</a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 Your Company. All rights reserved.</p>
            <div class="footer-links">
                <a href="#">Support</a>
                <a href="#">Privacy Policy</a>
                <a href="#">Terms of Service</a>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script type="module" src="/js/auth/login.js"></script>
</body>
</html>
