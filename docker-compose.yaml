version: '3.8'

services:
  postgres:
    image: docker.io/library/postgres:latest
    container_name: fsm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fsm-network
  
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    container_name: fsm-migrate
    environment:
      GOOSE_DRIVER: "postgres"
      GOOSE_DBSTRING: "postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable"
      GOOSE_MIGRATION_DIR: "."
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fsm-network
    restart: "no"

volumes:
  postgres_data:
    driver: local

networks:
  fsm-network:
    driver: bridge

