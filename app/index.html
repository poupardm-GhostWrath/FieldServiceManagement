<!DOCTYPE html>
<html lang="en-us">
  <head>
    <title>Field Service Management</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
  </head>
  <body>
    <div class="header">
      <h1>Field Service Management</h1>
    </div>
    <div class="login">
      <form>
        <input type="email" id="email" name="email" placeholder="Email Address" required><br>
        <input type="password" id="password" name="password" placeholder="Password" maxlength="64" required><br><br>
        <input type="submit" id="submit" value="Sign in">
      </form>
    </div>
    <div id="footer">
    </div>
  </body>
</html>
