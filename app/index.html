<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Field Service Management</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="login-wrapper">
      <!-- Left Side: Branding -->
      <div class="login-branding">
        <div class="brand-content">
          <h1 class="brand-title">Service Manager</h1>
          <p class="brand-tagline">Manage customers, inventory, and teams efficiently</p>
        </div>
      </div>

      <!-- Right Side: Form -->
      <div class="login-form-container">
        <div class="form-card">
          <h2>Welcome Back</h2>
          <p class="form-subtitle">Sign in to access your dashboard</p>

          <form id="loginForm" novalidate>
            <!-- Email Field -->
            <div class="form-group">
              <input
                type="email"
                id="email"
                name="email"
                required
                autocomplete="email"
                placeholder="Email Address"
              >
              <span class="error-message" id="emailError"></span>
            </div>

            <!-- Password Field -->
            <div class="form-group">
              <div class="password-input-wrapper">
                <input
                  type="password"
                  id="password"
                  name="password"
                  required
                  autocomplete="current-password"
                  placeholder="Password"
                >
                <button type="button" class="toggle-password" aria-label="Toggle password visibility">👁️</button>
              </div>
              <span class="error-message" id="passwordError"></span>
            </div>

            <!-- Remember Me & Forgot Password -->
            <div class="form-row">
              <label class="checkbox-label">
                <input type="checkbox" name="remember">
                <span>Remember me</span>
              </label>
              <a href="#" class="forgot-link">Forgot password</a>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary" id="submitBtn">
              <span class="btn-text">Sign In</span>
              <span class="btn-loader" style="display: none;">Signing in...</span>
            </button>
          </form>

          <!-- Registration Link -->
          <p class="signup-prompt">
            Don't have an account? <a href="register.html">Sign up</a>
          </p>

          <div class="alert alert-error" id="apiError" style="display: none;">
            <span class="alert-icon">⚠️</span>
            <span class="alert-message"></span>
          </div>
        </div>
      </div>
    </div>

    <script src="auth.js"></script>
  </body>
</html>
